<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#0a7c8c"/></marker>
    <marker id="ag" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,6 2,0 4" fill="#38a169"/></marker>
    <marker id="al" markerWidth="6" markerHeight="4" refX="1" refY="2" orient="auto"><polygon points="6 0,0 2,6 4" fill="#0a7c8c"/></marker>
    <marker id="agl" markerWidth="6" markerHeight="4" refX="1" refY="2" orient="auto"><polygon points="6 0,0 2,6 4" fill="#38a169"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="#f5f8fb" rx="8"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="16" font-weight="800" fill="#0d4e5c">🤖 Zubera Bot — System Architecture</text>
  <text x="480" y="42" text-anchor="middle" font-size="9" fill="#6a9aa6">AI-Powered Financial Advisory &amp; WhatsApp Personal Finance Assistant</text>

  <!-- ══════ ZONE: EXTERNAL DATA APIs (top) ══════ -->
  <rect x="25" y="52" width="380" height="105" rx="12" fill="rgba(14,124,140,0.05)" stroke="rgba(14,124,140,0.18)" stroke-width="1.5"/>
  <text x="38" y="70" font-size="9" font-weight="800" fill="#0a7c8c" letter-spacing="0.8">🌐 EXTERNAL DATA APIs</text>

  <!-- yFinance -->
  <rect x="40" y="80" width="105" height="65" rx="7" fill="#fff" stroke="#b8d4dc" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="92" y="100" text-anchor="middle" font-size="18">📈</text>
  <text x="92" y="114" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3c46">yFinance</text>
  <text x="92" y="124" text-anchor="middle" font-size="7" fill="#6b8a94">Stock prices, NAV</text>
  <text x="92" y="133" text-anchor="middle" font-size="7" fill="#6b8a94">NSE/BSE markets</text>

  <!-- MFAPI -->
  <rect x="155" y="80" width="105" height="65" rx="7" fill="#fff" stroke="#b8d4dc" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="207" y="100" text-anchor="middle" font-size="18">🏦</text>
  <text x="207" y="114" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3c46">MFAPI India</text>
  <text x="207" y="124" text-anchor="middle" font-size="7" fill="#6b8a94">MF NAV &amp; search</text>
  <text x="207" y="133" text-anchor="middle" font-size="7" fill="#6b8a94">1Y/3Y returns</text>

  <!-- DuckDuckGo -->
  <rect x="270" y="80" width="120" height="65" rx="7" fill="#fff" stroke="#b8d4dc" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="330" y="100" text-anchor="middle" font-size="18">🔍</text>
  <text x="330" y="114" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3c46">DuckDuckGo</text>
  <text x="330" y="124" text-anchor="middle" font-size="7" fill="#6b8a94">Web search API</text>
  <text x="330" y="133" text-anchor="middle" font-size="7" fill="#6b8a94">Market news</text>

  <!-- Arrow: APIs → Tools (down) -->
  <line x1="207" y1="148" x2="207" y2="195" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="185" y="160" width="55" height="12" fill="#f5f8fb" rx="2"/>
  <text x="212" y="170" text-anchor="middle" font-size="7" font-weight="700" fill="#0a7c8c">API Calls</text>

  <!-- ══════ ZONE: INTERACTION LAYER (center) ══════ -->
  <rect x="25" y="200" width="650" height="360" rx="12" fill="rgba(14,124,140,0.03)" stroke="rgba(14,124,140,0.14)" stroke-width="1.5"/>
  <text x="38" y="218" font-size="9" font-weight="800" fill="#0a7c8c" letter-spacing="0.8">🧠 INTERACTION LAYER (ONLINE)</text>

  <!-- ── USER (far left) ── -->
  <text x="12" y="318" text-anchor="middle" font-size="30">📱</text>
  <text x="12" y="340" text-anchor="middle" font-size="9" font-weight="800" fill="#1a3c46">USERS</text>
  <text x="12" y="350" text-anchor="middle" font-size="7" fill="#6b8a94">Investors &amp;</text>
  <text x="12" y="359" text-anchor="middle" font-size="7" fill="#6b8a94">Finance Seekers</text>

  <!-- Arrow: User → WhatsApp -->
  <line x1="30" y1="320" x2="53" y2="320" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="32" y="312" font-size="7" font-weight="700" fill="#0a7c8c">WhatsApp</text>
  <!-- Arrow: Reply back (green) -->
  <line x1="53" y1="335" x2="30" y2="335" stroke="#38a169" stroke-width="1" marker-end="url(#agl)"/>
  <text x="34" y="348" font-size="6.5" font-weight="600" fill="#38a169">Reply</text>

  <!-- WhatsApp Web -->
  <rect x="55" y="245" width="115" height="60" rx="7" fill="#fff" stroke="#b8d4dc" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="112" y="266" text-anchor="middle" font-size="18">💬</text>
  <text x="112" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3c46">WhatsApp Web</text>
  <text x="112" y="290" text-anchor="middle" font-size="7" fill="#6b8a94">Encrypted + QR Auth</text>

  <!-- Node.js Bridge -->
  <rect x="55" y="320" width="115" height="60" rx="7" fill="#fff" stroke="#b8d4dc" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="112" y="341" text-anchor="middle" font-size="18">🌉</text>
  <text x="112" y="355" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3c46">Node.js Bridge</text>
  <text x="112" y="365" text-anchor="middle" font-size="7" fill="#6b8a94">Baileys · ws://3001</text>

  <!-- Arrow: WA → Bridge -->
  <line x1="112" y1="307" x2="112" y2="318" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Arrow: Bridge → Agent (right) -->
  <line x1="172" y1="348" x2="225" y2="348" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="176" y="330" width="50" height="12" fill="#f5f8fb" rx="2"/>
  <text x="201" y="339" text-anchor="middle" font-size="6.5" font-weight="700" fill="#0a7c8c">WebSocket</text>
  <!-- Arrow: Agent → Bridge response (green) -->
  <line x1="225" y1="360" x2="172" y2="360" stroke="#38a169" stroke-width="1" marker-end="url(#agl)"/>
  <text x="201" y="372" text-anchor="middle" font-size="6.5" font-weight="600" fill="#38a169">Response</text>

  <!-- Agent Loop -->
  <rect x="232" y="232" width="166" height="70" rx="7" fill="#fff" stroke="#9a6fdf" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="315" y="254" text-anchor="middle" font-size="18">⚙️</text>
  <text x="315" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#1a3c46">Agent Loop</text>
  <text x="315" y="280" text-anchor="middle" font-size="7" fill="#6b8a94">Core engine · Max 20 iterations</text>
  <text x="315" y="290" text-anchor="middle" font-size="7" fill="#6b8a94">Async message processing</text>

  <!-- Context Builder -->
  <rect x="232" y="314" width="80" height="60" rx="6" fill="#fff" stroke="#4a9fe5" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="272" y="334" text-anchor="middle" font-size="14">📋</text>
  <text x="272" y="347" text-anchor="middle" font-size="8" font-weight="700" fill="#1a3c46">Context</text>
  <text x="272" y="356" text-anchor="middle" font-size="8" font-weight="700" fill="#1a3c46">Builder</text>
  <text x="272" y="366" text-anchor="middle" font-size="6.5" fill="#6b8a94">Prompt + Memory</text>

  <!-- Session Manager -->
  <rect x="318" y="314" width="80" height="60" rx="6" fill="#fff" stroke="#3db5a5" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="358" y="334" text-anchor="middle" font-size="14">💾</text>
  <text x="358" y="347" text-anchor="middle" font-size="8" font-weight="700" fill="#1a3c46">Session</text>
  <text x="358" y="356" text-anchor="middle" font-size="8" font-weight="700" fill="#1a3c46">Manager</text>
  <text x="358" y="366" text-anchor="middle" font-size="6.5" fill="#6b8a94">DB-backed</text>

  <!-- Arrow: Agent → Context/Session -->
  <line x1="315" y1="304" x2="315" y2="312" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Tool Registry -->
  <rect x="232" y="390" width="166" height="115" rx="7" fill="#fff" stroke="#e8983a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="315" y="408" text-anchor="middle" font-size="9" font-weight="700" fill="#1a3c46">🔧 Tool Registry (10+ Tools)</text>
  <!-- Tool chips -->
  <rect x="240" y="415" width="48" height="26" rx="3" fill="#f0f5f7"/><text x="264" y="427" text-anchor="middle" font-size="10">📈</text><text x="264" y="437" text-anchor="middle" font-size="6.5" fill="#1a3c46">Finance</text>
  <rect x="293" y="415" width="48" height="26" rx="3" fill="#f0f5f7"/><text x="317" y="427" text-anchor="middle" font-size="10">💰</text><text x="317" y="437" text-anchor="middle" font-size="6.5" fill="#1a3c46">Expense</text>
  <rect x="346" y="415" width="48" height="26" rx="3" fill="#f0f5f7"/><text x="370" y="427" text-anchor="middle" font-size="10">🎫</text><text x="370" y="437" text-anchor="middle" font-size="6.5" fill="#1a3c46">Tickets</text>
  <rect x="240" y="445" width="48" height="26" rx="3" fill="#f0f5f7"/><text x="264" y="457" text-anchor="middle" font-size="10">📚</text><text x="264" y="467" text-anchor="middle" font-size="6.5" fill="#1a3c46">RAG</text>
  <rect x="293" y="445" width="48" height="26" rx="3" fill="#f0f5f7"/><text x="317" y="457" text-anchor="middle" font-size="10">🔍</text><text x="317" y="467" text-anchor="middle" font-size="6.5" fill="#1a3c46">Search</text>
  <rect x="346" y="445" width="48" height="26" rx="3" fill="#f0f5f7"/><text x="370" y="457" text-anchor="middle" font-size="10">🌐</text><text x="370" y="467" text-anchor="middle" font-size="6.5" fill="#1a3c46">Fetch</text>

  <!-- Arrow: Agent → Tools -->
  <line x1="315" y1="376" x2="315" y2="388" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="342" y="385" font-size="6.5" font-weight="700" fill="#0a7c8c">Execute tools</text>

  <!-- ══════ ZONE: AI / LLM (inside Interaction Layer) ══════ -->
  <rect x="420" y="400" width="250" height="155" rx="10" fill="rgba(200,50,100,0.04)" stroke="rgba(200,50,100,0.14)" stroke-width="1.2"/>
  <text x="433" y="418" font-size="9" font-weight="800" fill="#c2185b" letter-spacing="0.8">🤖 AI / LLM PROVIDERS</text>

  <!-- Provider chips -->
  <rect x="430" y="428" width="108" height="28" rx="5" fill="#fff" stroke="#b8d4dc" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="446" font-size="12">🔀</text><text x="456" y="446" font-size="8.5" font-weight="600" fill="#1a3c46">LiteLLM</text><text x="497" y="446" font-size="6.5" fill="#6b8a94">Unified API</text>

  <rect x="545" y="428" width="115" height="28" rx="5" fill="#fff" stroke="#b8d4dc" stroke-width="1" filter="url(#shadow)"/>
  <text x="555" y="446" font-size="12">⚡</text><text x="571" y="446" font-size="8.5" font-weight="600" fill="#1a3c46">Groq</text><text x="597" y="446" font-size="6.5" fill="#6b8a94">llama-3.3-70b</text>

  <rect x="430" y="462" width="108" height="28" rx="5" fill="#fff" stroke="#b8d4dc" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="480" font-size="12">🟠</text><text x="458" y="480" font-size="8.5" font-weight="600" fill="#1a3c46">OpenRouter</text><text x="517" y="480" font-size="6.5" fill="#6b8a94">Claude, GPT</text>

  <rect x="545" y="462" width="115" height="28" rx="5" fill="#fff" stroke="#b8d4dc" stroke-width="1" filter="url(#shadow)"/>
  <text x="555" y="480" font-size="12">🦙</text><text x="571" y="480" font-size="8.5" font-weight="600" fill="#1a3c46">vLLM</text><text x="600" y="480" font-size="6.5" fill="#6b8a94">Qwen3-4B</text>

  <rect x="430" y="496" width="108" height="28" rx="5" fill="#fff" stroke="#b8d4dc" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="514" font-size="12">🛡️</text><text x="458" y="514" font-size="8.5" font-weight="600" fill="#1a3c46">Safety Layer</text><text x="520" y="514" font-size="6.5" fill="#6b8a94">Fact-check</text>

  <!-- Arrow: Agent → LLM (right+down) -->
  <polyline points="400,275 500,275 500,398" fill="none" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="505" y="326" width="64" height="12" fill="#f5f8fb" rx="2"/>
  <text x="537" y="335" text-anchor="middle" font-size="7" font-weight="700" fill="#0a7c8c">LLM Request</text>

  <!-- Arrow: LLM → Agent (green return up) -->
  <polyline points="516,398 516,275 400,275" fill="none" stroke="#38a169" stroke-width="1" marker-end="url(#agl)"/>
  <rect x="520" y="350" width="50" height="12" fill="#f5f8fb" rx="2"/>
  <text x="545" y="359" text-anchor="middle" font-size="7" font-weight="600" fill="#38a169">Response</text>

  <!-- ══════ DATABASE (right side) ══════ -->
  <!-- Cylinder top ellipse -->
  <ellipse cx="780" cy="248" rx="65" ry="16" fill="#12b5ca"/>
  <!-- Cylinder body -->
  <rect x="715" y="248" width="130" height="150" fill="url(#dbGrad)"/>
  <defs><linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a9aac"/><stop offset="100%" stop-color="#0d6e7a"/></linearGradient></defs>
  <!-- Cylinder bottom ellipse -->
  <ellipse cx="780" cy="398" rx="65" ry="16" fill="#0d636f"/>
  <!-- DB name -->
  <text x="780" y="253" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">🐘 PostgreSQL</text>
  <!-- Table rows -->
  <rect x="730" y="268" width="100" height="16" rx="3" fill="rgba(255,255,255,0.15)"/><text x="780" y="280" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">👤 users</text>
  <rect x="730" y="288" width="100" height="16" rx="3" fill="rgba(255,255,255,0.15)"/><text x="780" y="300" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">💬 sessions</text>
  <rect x="730" y="308" width="100" height="16" rx="3" fill="rgba(255,255,255,0.15)"/><text x="780" y="320" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">🎫 tickets</text>
  <rect x="730" y="328" width="100" height="16" rx="3" fill="rgba(255,255,255,0.15)"/><text x="780" y="340" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">💰 expenses</text>
  <rect x="730" y="348" width="100" height="16" rx="3" fill="rgba(255,255,255,0.15)"/><text x="780" y="360" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">⭐ preferences</text>
  <rect x="730" y="368" width="100" height="16" rx="3" fill="rgba(255,255,255,0.15)"/><text x="780" y="380" text-anchor="middle" font-size="8" fill="#fff" font-weight="500">📊 recommendations</text>
  <!-- Label -->
  <text x="780" y="425" text-anchor="middle" font-size="8" font-weight="700" fill="#0a8a9c">🗄️ Data Layer</text>

  <!-- Arrow: Session Mgr → DB -->
  <line x1="400" y1="345" x2="713" y2="345" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="510" y="332" width="90" height="12" fill="#f5f8fb" rx="2"/>
  <text x="555" y="341" text-anchor="middle" font-size="7" font-weight="700" fill="#0a7c8c">Data Access (R/W)</text>

  <!-- Arrow: DB → Session Mgr (green return) -->
  <line x1="713" y1="358" x2="400" y2="358" stroke="#38a169" stroke-width="1" marker-end="url(#agl)"/>
  <rect x="510" y="360" width="72" height="12" fill="#f5f8fb" rx="2"/>
  <text x="546" y="369" text-anchor="middle" font-size="7" font-weight="600" fill="#38a169">Query Results</text>

  <!-- Arrow: APIs → DB (data ingestion, top right) -->
  <polyline points="392,116 752,116 752,232" fill="none" stroke="#0a7c8c" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="540" y="102" width="78" height="12" fill="#f5f8fb" rx="2"/>
  <text x="579" y="112" text-anchor="middle" font-size="7" font-weight="700" fill="#0a7c8c">Data Ingestion</text>

</svg>
